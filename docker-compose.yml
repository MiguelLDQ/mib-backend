services:
  postgres:
    image: postgres:16-alpine
    container_name: mib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mib
      POSTGRES_USER: mib_user
      POSTGRES_PASSWORD: mib_password
    ports:
      - "5432:5432"
    volumes:
      - mib_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mib_user -d mib"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: mib-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/mib
      DATABASE_USERNAME: mib_user
      DATABASE_PASSWORD: mib_password
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-256-bits-please-replace-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"

volumes:
  mib_postgres_data:
